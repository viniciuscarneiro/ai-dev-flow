name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-links:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --max-concurrency 2
            --user-agent "Mozilla/5.0 (compatible; ai-dev-flow-ci/1.0; +https://github.com/viniciuscarneiro/ai-dev-flow)"
            --exclude-path "ai-dev-flow/prompts/**"
            './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  setup-smoke:
    name: setup.sh smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install into empty directory
        run: |
          set -euo pipefail
          DEST=$(mktemp -d)
          bash "$GITHUB_WORKSPACE/setup.sh" "$DEST"
          test -f "$DEST/ai-dev-flow/PLAYBOOK.md"
          test -d "$DEST/ai-dev-flow/prompts"
          test -d "$DEST/ai-dev-flow/work/drafts/analysis"
          test -f "$DEST/.github/prompts/flow-prd.prompt.md"
          count=$(find "$DEST" -type f | wc -l | tr -d ' ')
          if [ "$count" -ne 71 ]; then
            echo "Expected 71 files created, got $count"
            find "$DEST" -type f | sort
            exit 1
          fi
